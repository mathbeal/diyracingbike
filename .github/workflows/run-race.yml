name: Race Simulation

on:
  pull_request:
    paths:
      - 'race_config.json'

jobs:
  race:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed to push plots to race-plots branch
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for git show origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get baseline config from main branch
        run: |
          git show origin/main:race_config.json > race_config_baseline.json || \
          cp race_config.json race_config_baseline.json
          # If race_config.json does not exist on main, use the PR config as baseline

      - name: Run baseline race
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python race.py \
            --config race_config_baseline.json \
            --output baseline.json \
            --no-interactive

      - name: Run PR race
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python race.py \
            --config race_config.json \
            --output pr.json \
            --no-interactive

      - name: Generate race plot
        env:
          MPLBACKEND: Agg
        run: python scripts/plot_race.py pr.json --output race_plot.png

      - name: Publish plot to race-plots branch
        uses: actions/github-script@v7
        id: plot
        with:
          script: |
            const fs = require('fs');
            const branch  = 'race-plots';
            const filePath = `plots/pr-${{ github.event.number }}.png`;
            const content  = fs.readFileSync('race_plot.png').toString('base64');

            // Ensure the race-plots branch exists (orphan if missing)
            try {
              await github.rest.repos.getBranch({ ...context.repo, branch });
            } catch {
              const { data: emptyTree } = await github.rest.git.createTree({
                ...context.repo, tree: [],
              });
              const { data: emptyCommit } = await github.rest.git.createCommit({
                ...context.repo,
                message: 'init: race-plots branch',
                tree: emptyTree.sha,
                parents: [],
              });
              await github.rest.git.createRef({
                ...context.repo,
                ref: `refs/heads/${branch}`,
                sha: emptyCommit.sha,
              });
            }

            // Create or update the plot file
            let existingSha;
            try {
              const { data } = await github.rest.repos.getContent({
                ...context.repo, path: filePath, ref: branch,
              });
              existingSha = data.sha;
            } catch { /* file does not exist yet */ }

            const params = {
              ...context.repo,
              path: filePath,
              message: `plot: PR #${{ github.event.number }} race result`,
              content,
              branch,
              ...(existingSha ? { sha: existingSha } : {}),
            };
            await github.rest.repos.createOrUpdateFileContents(params);

            const url = `https://raw.githubusercontent.com/${{ github.repository }}/${branch}/${filePath}`;
            core.setOutput('url', url);

      - name: Generate comparison comment
        run: |
          python scripts/compare_results.py baseline.json pr.json > comment.md
          echo "" >> comment.md
          echo "### Race trajectory" >> comment.md
          echo "" >> comment.md
          echo "![Race Plot](${{ steps.plot.outputs.url }})" >> comment.md

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('comment.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
